<!doctype html>
<html lang="el">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Preconnect to Google Fonts origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Preload the Google Fonts CSS so the browser discovers font files early -->
  <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800;900&display=swap"
        as="style" />

  <!-- Load Google Fonts non-render-blocking -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800;900&display=swap"
        media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800;900&display=swap" />
  </noscript>

  <!-- Preload hero image (LCP element) -->
  <link rel="preload" href="/frame_modern_interior.webp" as="image" type="image/webp" />

  <meta name="description" content="Δωδεκάνησα Glass — Κατασκευή και τοποθέτηση γυάλινων συστημάτων, κουφωμάτων αλουμινίου και ενεργειακών υαλοπινάκων στα Δωδεκάνησα." />
  <title>δωδεκανησα glass</title>
</head>

<body>
  <div id="root">
    <!-- Static hero shell for instant FCP/LCP — React replaces this on mount -->
    <div style="position:relative;width:100%;height:100svh;background:#0B0C0E;overflow:hidden">
      <picture>
        <source srcset="/frame_modern_interior.webp" type="image/webp">
        <img src="/frame_modern_interior.jpg" alt="Modern glass interior"
             style="position:absolute;inset:-2%;width:104%;height:104%;object-fit:cover" fetchpriority="high">
      </picture>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:white;width:100%;padding:0 1rem;z-index:20">
        <h2 style="font-family:Montserrat,sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:-0.03em;line-height:0.9;font-size:clamp(40px,8vw,120px);margin-bottom:1rem">
          <span style="display:block">ΚΡΥΣΤΑΛΛΙΝΕΣ</span>
          <span style="display:block">ΛΥΣΕΙΣ</span>
        </h2>
        <p style="font-family:Montserrat,sans-serif;font-size:1.25rem;font-weight:500;opacity:0.9;letter-spacing:0.1em">Από την ιδέα έως την τοποθέτηση.</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
